<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Translator</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https: http:; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data: blob:;" />
  <meta name="theme-color" content="#0d0f11" />
  <script src="js/theme-init.js"></script>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/mobile.css" />
  <link rel="stylesheet" href="css/quill.core.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  
</head>
<body>
  <header class="bar">
    <h1 class="app-title">AI Translator <small id="buildInfo" style="font-weight:normal;font-size:0.6em;opacity:0.7"></small></h1>
    <div class="bar-tools">
      <button id="openSettings" class="icon-btn" type="button" title="设置" aria-label="设置" data-i18n-title="app.settings" data-i18n-aria-label="app.settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
      <button id="btnMdModeToggle" class="icon-btn" type="button" title="粘贴为纯文本" aria-label="粘贴为纯文本" aria-pressed="false"></button>
      <button id="btnThemeToggle" class="icon-btn" type="button" title="自动（跟随系统）" aria-label="自动（跟随系统）" aria-pressed="false"></button>
      <button id="btnToggleControls" class="icon-btn mobile-only" type="button" title="展开/收起配置" aria-label="展开/收起配置" aria-expanded="false" style="display:none" data-i18n-title="action.controlsToggle" data-i18n-aria-label="action.controlsToggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>
    </div>
  </header>
  <main class="layout">
    <section class="controls">
      <!-- 可折叠区域 -->
      <div id="controlsCollapsible" class="controls-collapsible">
        <label><select id="serviceSelect"></select></label>
        <label><select id="promptSelect"></select></label>
        <label><select id="langSelect" data-ref="lang"></select></label>
      </div>

      <!-- 核心操作区域 -->
      <div class="controls-actions">
        <div class="btn-row main-actions">
          <button id="btnTranslate" class="btn primary command-btn" type="button" title="翻译" aria-label="翻译" data-i18n-title="action.translate" data-i18n-aria-label="action.translate">
            <span class="btn-icon icon-translate" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8h8"></path><path d="M9 4v4c0 4-2 7-5 9"></path><path d="M6 12c1 2 3 4 6 5"></path><path d="M14 20l4-9 4 9"></path><path d="M15.5 17h5"></path></svg></span>
            <span class="btn-icon icon-cancel" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg></span>
            <span class="btn-label" data-i18n="action.translate">翻译</span>
          </button>
          <button id="btnClear" class="btn command-btn" type="button" title="清空" aria-label="清空" data-i18n-title="action.clear" data-i18n-aria-label="action.clear">
            <span class="btn-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M6 6l1 15h10l1-15"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg></span>
            <span class="btn-label" data-i18n="action.clear">清空</span>
          </button>
          <button id="btnCopy" class="btn command-btn" type="button" title="复制" aria-label="复制" data-i18n-title="action.copy" data-i18n-aria-label="action.copy">
            <span class="btn-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></span>
            <span class="btn-label" data-i18n="action.copy">复制</span>
          </button>
          <button id="btnAddImage" class="btn command-btn" type="button" title="图片" aria-label="图片" data-i18n-title="action.image" data-i18n-aria-label="action.image">
            <span class="btn-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"></rect><circle cx="8" cy="10" r="2"></circle><path d="M21 16l-5-5L5 19"></path></svg></span>
            <span class="btn-label" data-i18n="action.image">图片</span>
          </button>
        </div>
        <div class="attachment-bar" aria-label="图片输入" data-i18n-aria-label="field.vision">
          <span id="visionHint" class="status" aria-live="polite" style="display:none"></span>
          <input type="file" id="imagePicker" accept="image/*" multiple hidden />
          <div id="imageList" class="attachment-list" aria-live="polite"></div>
        </div>
      </div>
    </section>
    <section class="panes">
      <div class="pane" id="paneInput">
        <div class="pane-tools">
          <button class="btn-pane-toggle icon-btn" type="button" data-pane-target="input" title="收起输入框" aria-label="收起输入框" aria-expanded="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <button class="btn-expand icon-btn" type="button" title="全屏/退出全屏" aria-label="全屏/退出全屏" data-i18n-title="action.expandPaneToggle" data-i18n-aria-label="action.expandPaneToggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
          </button>
        </div>
        <div class="pane-collapsed-affordance" aria-hidden="true">
          <span class="pane-collapsed-dot"></span>
          <span class="pane-collapsed-short" data-i18n="pane.inputShort">输入</span>
          <span class="pane-collapsed-full" data-i18n="pane.inputCollapsed">输入框已收起</span>
        </div>
        <div id="inputText" class="ql-container" spellcheck="false"></div>
      </div>
      <div id="paneDivider" class="pane-divider" role="separator" tabindex="0" aria-orientation="vertical" aria-valuemin="20" aria-valuemax="80" aria-valuenow="50" aria-label="调整输入框和输出框大小" data-i18n-aria-label="action.resizePanes"></div>
      <div class="pane" id="paneOutput">
        <div class="pane-tools">
          <button class="btn-pane-toggle icon-btn" type="button" data-pane-target="output" title="收起输出框" aria-label="收起输出框" aria-expanded="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
          </button>
          <button class="btn-expand icon-btn" type="button" title="全屏/退出全屏" aria-label="全屏/退出全屏" data-i18n-title="action.expandPaneToggle" data-i18n-aria-label="action.expandPaneToggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
          </button>
        </div>
        <div class="pane-collapsed-affordance" aria-hidden="true">
          <span class="pane-collapsed-dot"></span>
          <span class="pane-collapsed-short" data-i18n="pane.outputShort">输出</span>
          <span class="pane-collapsed-full" data-i18n="pane.outputCollapsed">输出框已收起</span>
        </div>
        <div id="outputView" class="markdown-body" aria-live="polite" tabindex="0" data-role="output" data-copy-source data-i18n-data-placeholder="placeholder.output"></div>
      </div>
    </section>
    <section class="status" id="statusBar" aria-live="polite" data-i18n="status.ready">就绪</section>
  </main>

  <!-- 设置模态 -->
  <div id="settingsOverlay" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <header class="modal-bar">
        <h2 id="settingsTitle" data-i18n="app.settings">设置</h2>
        <div class="flex-gap"></div>
        <button id="closeSettings" class="btn" data-i18n="action.closeEsc">关闭 (Esc)</button>
      </header>
      <div class="modal-body settings-body">
        <form id="settingsForm">
          <fieldset>
            <legend data-i18n="section.serviceManage">服务管理</legend>
            <div class="btn-row" style="gap:.5rem;align-items:flex-end;flex-wrap:wrap">
              <label data-i18n-label-prefix="field.currentService">当前服务 <select id="svcSelect"></select></label>
              <label data-i18n-label-prefix="field.name">名称 <input id="svcName" type="text" placeholder="服务名称" data-i18n-placeholder="placeholder.serviceName"/></label>
              <button type="button" id="btnAddSvc" class="btn" data-i18n="action.addConfig">新增配置</button>
              <button type="button" id="btnDelSvc" class="btn danger" data-i18n="action.deleteConfig">删除配置</button>
              <button type="submit" class="btn primary" data-i18n="action.save">保存</button>
            </div>
          </fieldset>

          <fieldset>
            <legend data-i18n="section.promptManage">Prompt 管理</legend>
            <div class="btn-row" style="gap:.5rem;align-items:flex-end;flex-wrap:wrap">
              <label data-i18n-label-prefix="field.currentPrompt">当前 Prompt <select id="promptSelectSettings"></select></label>
              <label data-i18n-label-prefix="field.name">名称 <input id="promptName" type="text" placeholder="Prompt 名称" data-i18n-placeholder="placeholder.promptName"/></label>
              <button type="button" id="btnAddPrompt" class="btn" data-i18n="action.addPrompt">新增 Prompt</button>
              <button type="button" id="btnDelPrompt" class="btn danger" data-i18n="action.deletePrompt">删除 Prompt</button>
            </div>
            <label data-i18n="field.template">模板</label>
            <textarea name="promptTemplate" data-field="promptTemplate" rows="10" placeholder="Prompt 模板" data-i18n-placeholder="placeholder.promptTemplate"></textarea>
          </fieldset>

          <fieldset>
            <legend data-i18n="section.global">全局</legend>
            <label data-i18n-label-prefix="field.masterPassword">主密码（可选） <input name="masterPassword" id="masterPassword" data-field="masterPassword" type="password" placeholder="留空则使用默认密钥" autocomplete="new-password" data-i18n-placeholder="placeholder.masterPassword" /></label>
            <label data-i18n-label-prefix="field.outputLanguage">输出语言 <select name="targetLanguage" data-field="targetLanguage"></select></label>
          </fieldset>

          <fieldset>
            <legend data-i18n="section.service">服务</legend>
            <label data-i18n-label-prefix="field.apiType">API 类型
              <select name="apiType" data-field="apiType">
                <option value="openai-responses">OpenAI Responses API</option>
                <option value="openai-chat">OpenAI Chat Completions</option>
                <option value="claude">Claude (Anthropic)</option>
              </select>
            </label>
            <label data-i18n-label-prefix="field.baseUrl">Base URL <input name="baseUrl" data-field="baseUrl" placeholder="https://api.openai.com/v1" required /></label>
            <label data-i18n-label-prefix="field.apiKey">API Key <input name="apiKey" data-field="apiKey" type="password" placeholder="sk-..." autocomplete="off" /></label>
            <label data-i18n-label-prefix="field.model">模型 <input name="model" data-field="model" placeholder="gpt-5.5 / claude-opus-4-7" /></label>
            <label data-i18n-label-prefix="field.vision">视觉（图片输入） <input type="checkbox" name="vision" data-field="vision" /></label>
          </fieldset>
        <fieldset><legend data-i18n="section.advanced">高级</legend>
          <label data-i18n-label-prefix="field.stream">流式输出 <input type="checkbox" name="stream" data-field="stream"/></label>
          <label data-i18n-label-prefix="field.temperature">Temperature <input type="number" step="0.1" min="0" max="2" name="temperature" data-field="temperature"/></label>
          <label data-i18n-label-prefix="field.maxOutputTokens">Max Output Tokens <input type="number" min="1" name="maxOutputTokens" data-field="maxOutputTokens"/></label>
          <label data-i18n-label-prefix="field.timeoutMs">超时(ms) <input type="number" min="1000" name="timeoutMs" data-field="timeoutMs" placeholder="30000"/></label>
          <label data-i18n-label-prefix="field.retries">重试次数 <input type="number" min="0" max="5" name="retries" data-field="retries" placeholder="2"/></label>
          <label data-i18n-label-prefix="field.imageCompression">启用图片压缩 <input type="checkbox" name="imageCompression" data-field="imageCompression"/></label>
          <label data-i18n-label-prefix="field.imageQuality">图片压缩质量 (0.1-1.0) <input type="number" step="0.1" min="0.1" max="1.0" name="imageQuality" data-field="imageQuality" placeholder="0.8"/></label>
          </fieldset>
        </form>

        <div class="settings-actions" aria-label="设置操作" data-i18n-aria-label="section.serviceManage">
          <button id="toggleSettingsActions" class="btn icon-only" type="button" title="收起/展开" aria-label="收起/展开" aria-pressed="false" style="align-self:flex-end" data-i18n-title="action.collapse" data-i18n-aria-label="action.collapse">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 9l4 4 4-4"/></svg>
            </span>
          </button>
          <div class="btn-row">
            <button type="button" id="btnTest" class="btn" title="连通性测试" data-i18n-title="action.test"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6M12 16v6M4 12h6M14 12h6"/></svg></span><span class="label" data-i18n="action.test">连通性测试</span></button>
            <button type="button" id="btnExport" class="btn" title="导出(包含密钥)" data-i18n-title="action.exportFull"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v8M8 9l4-4 4 4"/><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/></svg></span><span class="label" data-i18n="action.exportFull">导出(包含密钥)</span></button>
            <button type="button" id="btnExportSafe" class="btn" title="导出(移除密钥)" data-i18n-title="action.exportSafe"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v8M8 9l4-4 4 4"/><path d="M3 15h18"/></svg></span><span class="label" data-i18n="action.exportSafe">导出(移除密钥)</span></button>
            <button type="button" id="btnImport" class="btn" title="导入" data-i18n-title="action.import"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V11M16 15l-4 4-4-4"/><path d="M21 9V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v4"/></svg></span><span class="label" data-i18n="action.import">导入</span></button>
            <button type="button" id="btnImportUrl" class="btn" title="URL导入" data-i18n-title="action.importUrl"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 1 0-7l1-1a5 5 0 0 1 7 7l-1 1"/><path d="M14 11a5 5 0 0 1 0 7l-1 1a5 5 0 0 1-7-7l1-1"/></svg></span><span class="label" data-i18n="action.importUrl">URL导入</span></button>
          </div>
          <input type="file" id="importFile" accept="application/json" hidden />
          <section id="settingsStatus" class="status" aria-live="polite" data-i18n="status.unchanged">未修改</section>
        </div>
      </div>
    </div>
  </div>

  <!-- 图片管理模态 -->
  <div id="imageManagerOverlay" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="imgMgrTitle">
      <header class="modal-bar">
        <h2 id="imgMgrTitle" data-i18n="modal.imageManager">已添加图片</h2>
        <div class="flex-gap"></div>
        <button id="closeImgMgr" class="btn" data-i18n="action.closeEsc">关闭 (Esc)</button>
      </header>
      <div class="modal-body">
        <div id="imgMgrList" class="manager-list"></div>
        <div class="btn-row" style="margin-top:16px;justify-content:flex-end">
           <button id="btnClearImages" class="btn danger" data-i18n="action.clearAllImages">清空所有图片</button>
        </div>
      </div>
    </div>
  </div>

  
  <!-- 导入 URL 模态 -->
  <div id="importUrlOverlay" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="importUrlTitle">
      <header class="modal-bar">
        <h2 id="importUrlTitle" data-i18n="modal.importUrl">URL 导入</h2>
        <div class="flex-gap"></div>
        <button id="closeImportUrl" class="btn" data-i18n="action.closeEsc">关闭 (Esc)</button>
      </header>
      <div class="modal-body">
        <form id="importUrlForm">
          <label data-i18n-label-prefix="field.configUrl">配置 URL
            <input id="importUrlInput" type="url" placeholder="https://example.com/ai_tr_config.json" required data-i18n-placeholder="placeholder.configUrl" />
          </label>
          <div class="btn-row" style="margin-top:8px">
            <button type="button" id="cancelImportUrl" class="btn" data-i18n="action.cancel">取消</button>
            <button type="submit" class="btn primary" data-i18n="action.import">导入</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- 主密码验证模态 -->
  <div id="mpPromptOverlay" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="mpPromptTitle">
      <header class="modal-bar">
        <h2 id="mpPromptTitle" data-i18n="modal.masterPassword">主密码验证</h2>
        <div class="flex-gap"></div>
        <button id="closeMpPrompt" class="btn" data-i18n="action.closeEsc">关闭 (Esc)</button>
      </header>
      <div class="modal-body">
        <form id="mpPromptForm">
          <label data-i18n-label-prefix="field.masterPasswordVerify">请输入导入配置的主密码以验证解锁
            <input id="mpPromptInput" type="password" placeholder="主密码" autocomplete="new-password" required data-i18n-placeholder="field.masterPassword" />
          </label>
          <div class="btn-row" style="margin-top:8px">
            <button type="button" id="cancelMpPrompt" class="btn" data-i18n="action.cancel">取消</button>
            <button type="submit" class="btn primary" data-i18n="action.confirm">确定</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="js/theme.js"></script>
  <script type="module" src="js/ui-translate.js"></script>
  <script type="module" src="js/ui-settings-modal.js"></script>
  <script type="module" src="js/extension-bridge.js"></script>
  <script type="module" src="js/pwa.js"></script>
</body>
</html>
